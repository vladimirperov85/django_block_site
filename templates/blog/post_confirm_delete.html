{% extends "base.html" %}
{% block title %}Удаление поста{%endblock %}

{% block content %}
<section class="form-page">
        <h1>Удаление поста</h1>
        <p>Вы уверены, что хотите удалить пост! "{{post.title}}"?</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit">Удалить</button>
                    <a class ="button secondary" href="{% url 'post_detail' post.pk %}">Отмена</a>
                </form>
</section>
{%endblock%}
