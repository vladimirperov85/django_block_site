<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    "<title>{% block title %}Мой Блог{% endblock %}</title>\n    
    {% load static %}\n   
    <link rel=\"stylesheet\" href=\"{% static 'css/style.css' %}\">\n    
    <script src=\"{% static 'js/main.js' %}\" defer></script>"
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        nav {
            background-color: #2c3e50;
            padding: 1rem 2rem;
            text-align: center;
        }

        nav span {
            color: #ecf0f1;
            margin: 0 10px;
            font-weight: 500;
        }

        main {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .form-page {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            margin-top: 1rem;
        }

        .form-page h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        form.content-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .content-form p {
            margin: 0;
        }

        .content-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #34495e;
        }

        .content-form input[type="text"],
        .content-form input[type="email"],
        .content-form input[type="password"],
        .content-form input[type="file"],
        .content-form textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .content-form input:focus,
        .content-form textarea:focus,
        .content-form select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .content-form .form-text {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 0.3rem;
        }

        .content-form .errorlist {
            background-color: #fdeaea;
            border: 1px solid #e57373;
            color: #c62828;
            padding: 0.6rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            list-style: none;
            font-size: 0.9rem;
        }

        .content-form .errorlist li {
            margin: 0;
        }

        button[type="submit"] {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            margin-top: 1rem;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
        }

        footer {
            text-align: center;
            padding: 1.5rem 0;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 3rem;
        }

        @media (max-width: 600px) {
            .form-page {
                padding: 1.5rem;
            }
            nav {
                padding: 0.8rem 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <span>Главная</span> |
        <span>Блог</span> |
        <span>Профиль</span> |
        <span>Выйти (user)</span> |
        <span>Войти</span> |
        <span>Регистрация</span>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {{ now|date:"Y" }} Мой Блог</p>
    </footer>
</body>
</html>
